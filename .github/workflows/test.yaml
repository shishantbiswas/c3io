name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup C3
      uses: radekm/setup-c3@v2
      with:
        version: v0.7.10

    - name: Run Tests
      run: c3c test
